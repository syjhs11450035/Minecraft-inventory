<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>Minecraft Inventory Manager</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
h1 { color: #2d6a4f; }
.card { background: #f1f8f4; border: 1px solid #d8ecde; padding: 20px; border-radius: 12px; margin: 16px 0; }
code { background: #e8e8e8; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<h1>🤖 Minecraft 倉庫管家</h1>
<div class="card">
  <p>這是專案內建的靜態 HTML 伺服器，提供 <code>/html/</code> 目錄。</p>
  <p>可在 Streamlit 設定分頁中啟動或停止。</p>
</div>
<div class="card">
  <h3>功能</h3>
  <ul>
    <li>📦 多容器庫存彙總（箱、組、個）</li>
    <li>🗄️ 區域分類 + 快照歷程</li>
    <li>🔍 箱子預覽（不需走過去開箱）</li>
    <li>🤖 AI：以 <code>ai!</code> 起頭的訊息會交給 AI 處理</li>
  </ul>
</div>
</body>
</html>
