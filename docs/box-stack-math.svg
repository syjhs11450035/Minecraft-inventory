<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#7e22ce"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="920" height="360" fill="url(#bg2)"/>
  <text x="460" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9">📦 箱 - 组 - 个 数量换算</text>
  <text x="460" y="65" text-anchor="middle" font-size="13" fill="#94a3b8">stackSize 来自 minecraft-data，会因物品而异</text>

  <!-- 个 -->
  <g filter="url(#sh)">
    <rect x="60" y="110" width="240" height="180" rx="16" fill="url(#g1)"/>
    <text x="180" y="155" text-anchor="middle" font-size="60">🪨</text>
    <text x="180" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="white">1 个</text>
    <text x="180" y="226" text-anchor="middle" font-size="13" fill="#cbd5e1">单一物品</text>
    <text x="180" y="252" text-anchor="middle" font-size="13" fill="#cbd5e1">石头 ×1</text>
    <text x="180" y="274" text-anchor="middle" font-size="11" fill="#94a3b8">最小单位</text>
  </g>

  <text x="320" y="210" text-anchor="middle" font-size="36" fill="#cbd5e1">×</text>

  <!-- 组 -->
  <g filter="url(#sh)">
    <rect x="340" y="110" width="240" height="180" rx="16" fill="url(#g2)"/>
    <text x="460" y="155" text-anchor="middle" font-size="60">📚</text>
    <text x="460" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="white">1 组 = stackSize</text>
    <text x="460" y="226" text-anchor="middle" font-size="13" fill="#dcfce7">石头 64 · 末影珍珠 16</text>
    <text x="460" y="248" text-anchor="middle" font-size="13" fill="#dcfce7">剑 1 · 蛋 16</text>
    <text x="460" y="274" text-anchor="middle" font-size="11" fill="#bbf7d0">一个堆叠</text>
  </g>

  <text x="600" y="210" text-anchor="middle" font-size="36" fill="#cbd5e1">×27</text>

  <!-- 箱 -->
  <g filter="url(#sh)">
    <rect x="620" y="110" width="240" height="180" rx="16" fill="url(#g3)"/>
    <text x="740" y="155" text-anchor="middle" font-size="60">📦</text>
    <text x="740" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="white">1 箱 = 27 组</text>
    <text x="740" y="226" text-anchor="middle" font-size="13" fill="#f3e8ff">潜影盒 27 格</text>
    <text x="740" y="248" text-anchor="middle" font-size="13" fill="#f3e8ff">石头满箱 = 1728</text>
    <text x="740" y="274" text-anchor="middle" font-size="11" fill="#e9d5ff">仓库基本单位</text>
  </g>

  <text x="460" y="332" text-anchor="middle" font-size="13" fill="#94a3b8">例：石头 4096 → ⌊4096÷1728⌋=2 箱 · ⌊(4096-3456)÷64⌋=10 组 · 0 个</text>
</svg>
