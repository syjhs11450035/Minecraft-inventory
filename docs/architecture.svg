<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="mcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#84cc16"/>
      <stop offset="1" stop-color="#4d7c0f"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cbd5e1"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="920" height="620" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="460" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9">AI-Bot Minecraft 库存管理器 · 架构总览</text>
  <text x="460" y="64" text-anchor="middle" font-size="13" fill="#94a3b8">Streamlit UI ↔ Express API ↔ mineflayer + PostgreSQL</text>

  <!-- Browser -->
  <g filter="url(#shadow)">
    <rect x="340" y="100" width="240" height="70" rx="14" fill="url(#browserGrad)"/>
    <text x="460" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="white">🌐 浏览器</text>
    <text x="460" y="154" text-anchor="middle" font-size="12" fill="#e9d5ff">Chrome / Safari / Edge</text>
  </g>

  <!-- Arrow Browser → UI -->
  <line x1="460" y1="170" x2="460" y2="210" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="475" y="194" font-size="11" fill="#94a3b8">HTTP</text>

  <!-- Streamlit UI -->
  <g filter="url(#shadow)">
    <rect x="220" y="210" width="480" height="100" rx="14" fill="url(#uiGrad)"/>
    <text x="460" y="240" text-anchor="middle" font-size="18" font-weight="700" fill="white">🐍 Streamlit UI · Python</text>
    <text x="460" y="262" text-anchor="middle" font-size="12" fill="#dbeafe">main/main.py · main/ui/* · main/ui/tabs/*</text>
    <text x="460" y="282" text-anchor="middle" font-size="11" fill="#bfdbfe">📦 仓库 · 🗺️ 箱子管理 · ⚙️ 设定 · 🧰 其他 · 📊 日志</text>
    <text x="460" y="299" text-anchor="middle" font-size="11" fill="#bfdbfe">深色侧栏 · 状态徽章 · 箱-组-个 换算</text>
  </g>

  <!-- Arrow UI → API -->
  <line x1="460" y1="310" x2="460" y2="360" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="475" y="340" font-size="11" fill="#94a3b8">REST · /api/*</text>

  <!-- Express API -->
  <g filter="url(#shadow)">
    <rect x="220" y="360" width="480" height="100" rx="14" fill="url(#apiGrad)"/>
    <text x="460" y="390" text-anchor="middle" font-size="18" font-weight="700" fill="white">⚙️ Express API · TypeScript</text>
    <text x="460" y="412" text-anchor="middle" font-size="12" fill="#d1fae5">artifacts/api-server/src/routes/{bot, snapshots, areas}</text>
    <text x="460" y="432" text-anchor="middle" font-size="11" fill="#a7f3d0">lib/bot.ts · lib/inventory.ts (NBT 解析) · lib/event-log.ts</text>
    <text x="460" y="449" text-anchor="middle" font-size="11" fill="#a7f3d0">单实例 · 多机器人就绪 (Map&lt;id, BotInstance&gt;)</text>
  </g>

  <!-- Arrow API → Minecraft (left) -->
  <path d="M 320 460 Q 250 500 200 530" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="225" y="500" font-size="11" fill="#94a3b8">mineflayer</text>

  <!-- Arrow API → Postgres (right) -->
  <path d="M 600 460 Q 670 500 720 530" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="640" y="500" font-size="11" fill="#94a3b8">drizzle ORM</text>

  <!-- Minecraft Server -->
  <g filter="url(#shadow)">
    <rect x="40" y="510" width="280" height="80" rx="14" fill="url(#mcGrad)"/>
    <text x="180" y="540" text-anchor="middle" font-size="17" font-weight="700" fill="white">⛏️ Minecraft Server</text>
    <text x="180" y="562" text-anchor="middle" font-size="11" fill="#ecfccb">开箱 / 木桶 / 末影箱</text>
    <text x="180" y="578" text-anchor="middle" font-size="11" fill="#ecfccb">潜影盒 NBT 自动展开</text>
  </g>

  <!-- PostgreSQL -->
  <g filter="url(#shadow)">
    <rect x="600" y="510" width="280" height="80" rx="14" fill="url(#dbGrad)"/>
    <text x="740" y="540" text-anchor="middle" font-size="17" font-weight="700" fill="white">🐘 PostgreSQL</text>
    <text x="740" y="562" text-anchor="middle" font-size="11" fill="#fef3c7">chest_areas · container_snapshots</text>
    <text x="740" y="578" text-anchor="middle" font-size="11" fill="#fef3c7">snapshot_items · bot_state</text>
  </g>
</svg>
